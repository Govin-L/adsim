spring:
  application:
    name: adsim-server
  data:
    mongodb:
      uri: mongodb://localhost:27017/adsim
    redis:
      host: localhost
      port: 6379

server:
  port: 8180

adsim:
  llm:
    api-key: ${LLM_API_KEY:}
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    model: ${LLM_MODEL:gpt-4o-mini}
  simulation:
    max-concurrency: 20
    batch-delay-ms: 100
    max-retries: 3
    min-success-rate: 0.8
    agent-batch-size: 20
